services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER     : ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB       : ${POSTGRES_DB:-caterpillar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test     : ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval : 5s
      timeout  : 5s
      retries  : 10

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test     : ["CMD", "redis-cli", "ping"]
      interval : 5s
      timeout  : 3s
      retries  : 10

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context   : ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL    : postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-caterpillar}
      REDIS_URL       : redis://redis:6379
      ONNX_MODEL_PATH : /app/models/fault_classifier.onnx
    volumes:
      - ./ai/models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test     : ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval : 10s
      timeout  : 5s
      retries  : 5
      start_period: 15s

  # ── React Frontend (nginx) ──────────────────────────────────
  frontend:
    build:
      context   : ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
